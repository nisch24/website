# =============================================================================
# Personal Portfolio — Jekyll Configuration for GitHub Pages
# =============================================================================

title: "Your Name"
description: >-
  Applied Mathematician & Quantitative Researcher.
  Penn State CS · Arcfield · Pursuing impactful research at the
  intersection of statistics, machine learning, and engineering.

# Change <username> to your GitHub username
baseurl: ""
url: "https://<username>.github.io"

# Theme (GitHub Pages compatible)
remote_theme: pages-themes/minimal@v0.2.0

plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme

# Markdown rendering
markdown: kramdown
kramdown:
  input: GFM

# Build settings
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
